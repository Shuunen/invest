name: ci

on: push

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: 10

      - name: Setup Node 24 with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile && echo install dependencies ok ✅

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: "master"

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps && echo playwright install ok ✅

      - name: Run Check
        run: pnpm run check
